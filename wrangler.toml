name = "playground-aauth-dev"
main = "src/index.ts"
compatibility_date = "2025-04-01"
# @hellocoop/httpsig references `Buffer` in signature.js (a Node built-in);
# nodejs_compat exposes it at the Worker runtime level.
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"

[vars]
ORIGIN = "https://web-agent.aauth.dev"
AGENT_NAME = "AAuth Web Agent Demo"

[[kv_namespaces]]
binding = "WEBAUTHN_KV"
id = "8f3528fb8a884a7fa5d6e506ee783eca"

# Custom domains — requires aauth.dev zone in this Cloudflare account.
# playground.aauth.dev is kept as a route so the worker can 301 legacy
# links to web-agent.aauth.dev (see redirect middleware in src/index.ts).
[[routes]]
pattern = "web-agent.aauth.dev"
custom_domain = true

[[routes]]
pattern = "playground.aauth.dev"
custom_domain = true

[[queues.producers]]
queue = "aauth-events"
binding = "EVENTS_QUEUE"
